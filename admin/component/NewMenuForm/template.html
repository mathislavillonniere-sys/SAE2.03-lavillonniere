<div class="addMenu">
    <h4 class="addMenu__title"># Ajouter un film</h4>
    <form class="addMenu__form">
        <input required type="text" name="titre" placeholder="Titre du film">
        <input required type="text" name="realisateur" placeholder="Réalisateur">
        <input required type="number" name="annee" placeholder="Année de sortie">
        <input required type="number" name="duree" placeholder="Durée (minutes)">
        <input required type="text" name="description" placeholder="Description / Synopsis">
        <input required type="number" name="category" placeholder="ID de la catégorie (ex: 1, 2, 3...)">
        <input required type="text" name="poster" placeholder="Nom du fichier de l'affiche (ex: film.jpg)">
        <input required type="text" name="trailer" placeholder="URL du trailer YouTube">
        <input required type="number" name="age" placeholder="Restriction d'âge (0, 12, 16...)">
        <input onclick="{{handler}}" type="button" value="Ajouter le film">
    </form>
</div>
