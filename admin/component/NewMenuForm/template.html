<div class="addMenu">
    <h4 class="addMenu__title"># Ajouter un film</h4>
    <form class="addMenu__form">
        

        <input required type="text" name="titre" placeholder="Saisir le titre d'un film" pattern="[^0-9]*" title="Numbers are not allowed">
        <input required type="text" name="realisateur" placeholder="Saisir le réalisateur" pattern="[^0-9]*" title="Numbers are not allowed">
        <input required type="text" name="annee" placeholder="Saisir l'année" pattern="^[0-9]{4}$" title="Please enter a valid year">
        <input required type="text" name="duree" placeholder="Saisir la durée" pattern="^[0-9]{1,3}$" title="Please enter a valid duration">
        <input required type="text" name="description" placeholder="Saisir la description" pattern="[^0-9]*" title="Numbers are not allowed">
        <input required type="text" name="categorie" placeholder="Saisir la catégorie" pattern="[^0-9]*" title="Numbers are not allowed">
        <input required type="text" name="nom fichier" placeholder="Saisir le nom du fichier" pattern="[^0-9]*" title="Numbers are not allowed">
        <input required type="text" name="url trailer" placeholder="Saisir l'URL du trailer" pattern="^https?://.*$" title="Please enter a valid URL">
        <input required type="text" name="restriction age" placeholder="Saisir la restriction d'âge" pattern="[^0-9]*" title="Numbers are not allowed">
        <input onclick="{{handler}}" type="button" value="Update" name="todo">

    </form>
</div>
