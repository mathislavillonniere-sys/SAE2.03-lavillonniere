<div class="addProfile">
  <h4 class="addProfile__title">Ajouter / Modifier un profil</h4>
  <form class="addProfile__form">
    <input type="hidden" name="id" />
    <select name="profile_select" onchange="C.handlerLoadProfile(this.value)">
      <option value="">-- Nouveau profil --</option>
      {{profiles}}
    </select>
    <input required type="text" name="name" placeholder="Nom du profil" />
    <input
      type="text"
      name="avatar"
      placeholder="Nom du fichier avatar (ex: avatar.jpg)"
    />
    <input
      required
      type="number"
      name="min_age"
      placeholder="Restriction d'âge (0, 12, 16...)"
    />
    <input onclick="{{handler}}" type="button" value="Sauvegarder" />
  </form>
</div>
