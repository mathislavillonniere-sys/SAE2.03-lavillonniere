<head>
  <title>Back Office</title>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@200&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="./css/base.css">
  <link rel="stylesheet" href="./component/NewMenuForm/style.css" />
  <link rel="stylesheet" href="./component/ProfileForm/style.css" />

</head>

<body>

  <section id="app">

    <nav>
      <h1>BACK OFFICE</h1>
    </nav>

    <section id="log"></section>

    <section id="addMenu"></section>

    <section id="addProfile"></section>


  </section>

  <script type="module">

    import { NewMenuForm } from './component/NewMenuForm/script.js';
    import { DataMovie } from './data/dataMovie.js';
    import { Log } from './component/Log/script.js';
    import { ProfileForm } from "./component/ProfileForm/script.js";
    import { DataProfile } from "./data/dataProfile.js";

    window.C = {};



    C.handlerUpdate = async function () {
      let form = document.querySelector('.addMenu__form');
      let fd = new FormData(form);
      let res = await DataMovie.add(fd);
      V.renderLog(res);
    }

    C.handlerAddProfile = async function() {
    let form = document.querySelector('.addProfile__form');
    let fd = new FormData(form);
    let id = fd.get('id');
    
    let res;
    if (id) {
        res = await DataProfile.update(fd);
    } else {
        res = await DataProfile.add(fd);
    }
    V.renderLog(res);
    // Recharge le formulaire avec les profils à jour
    let profiles = await DataProfile.readProfiles();
    V.renderProfile("C.handlerAddProfile()", profiles);
};

C.handlerLoadProfile = async function(id) {
    if (!id) {
        // Nouveau profil — vide le formulaire
        document.querySelector('.addProfile__form input[name="id"]').value = "";
        document.querySelector('.addProfile__form input[name="name"]').value = "";
        document.querySelector('.addProfile__form input[name="avatar"]').value = "";
        document.querySelector('.addProfile__form input[name="min_age"]').value = "";
        return;
    }
    // Charge les données du profil sélectionné
    let profiles = await DataProfile.readProfiles();
    let profile = profiles.find(p => p.id == id);
    if (profile) {
        document.querySelector('.addProfile__form input[name="id"]').value = profile.id;
        document.querySelector('.addProfile__form input[name="name"]').value = profile.name;
        document.querySelector('.addProfile__form input[name="avatar"]').value = profile.avatar || "";
        document.querySelector('.addProfile__form input[name="min_age"]').value = profile.min_age;
    }
};



   C.start = async function() {
    V.renderLog("Bienvenue dans le back office");
    V.renderMenu("C.handlerUpdate()");
    let profiles = await DataProfile.readProfiles();
    V.renderProfile("C.handlerAddProfile()", profiles);
};

    window.V = {};

    V.renderLog = function (txt) {
      let content = document.querySelector('#log');
      content.innerHTML = Log.format(txt);
    }

    V.renderMenu = function (handler) {
      let content = document.querySelector('#addMenu');
      content.innerHTML = NewMenuForm.format(handler);
    }

    V.renderProfile = function(handler, profiles) {
    let content = document.querySelector('#addProfile');
    content.innerHTML = ProfileForm.format(handler, profiles);
};
    C.start();
  </script>
</body>

</html>
